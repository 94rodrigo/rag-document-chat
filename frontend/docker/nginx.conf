server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Matches the backend's MAX_FILE_SIZE (app/domain/documents/service.py). Nginx's own
    # default is 1MB, which silently 413s any real document before it reaches the API.
    client_max_body_size 50M;

    # Proxy API calls to the backend container (compose service name "api").
    # SSE chat streaming needs buffering off so chunks flush immediately.
    #
    # 127.0.0.11 is Docker's embedded DNS server. A plain `proxy_pass http://api:8000`
    # resolves "api" once at nginx startup and caches that IP forever, so any time the
    # api container restarts or gets recreated (rebuild, crash recovery, redeploy) this
    # container keeps proxying to a dead IP and 502s until nginx itself restarts. Putting
    # the host in a variable forces nginx to re-resolve it (cached for `valid`) instead.
    #
    # No path after $api_upstream: proxy_pass disables its usual location-prefix rewrite
    # when the target is a variable, so a literal "/api/" here would double up with the
    # incoming request's own "/api/..." prefix (404). Passing the bare host forwards the
    # original request URI unchanged, which is what we want since upstream's routes live
    # at the same /api/v1/... paths.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location ~* \.(?:css|js|svg|woff2?|ttf|eot|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # nginx's stock mime.types has no .mjs entry, so it falls back to
    # application/octet-stream — browsers refuse to execute a module Worker (react-pdf's
    # PDF.js worker, pdfjs-dist ships as .mjs) whose response isn't a JS MIME type, so
    # every PDF preview fails to load even though the file itself serves fine.
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # SPA fallback — client-side routing owns anything not matched above.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
